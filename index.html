<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Results summary component</title>
  </head>
  <body>
    <main>
      <div class="result-section-container">
        <div class="result-section">
          <div class="result-section-heading-container">
            <p>Your Result</p>
          </div>
          <div class="result-section-score-container">
            <div class="result-section-score-top">
              <h1>76</h1>
            </div>
            <div class="result-section-score-bottom">
              <p>of 100</p>
            </div>
          </div>
          <div class="result-section-comment-container">
            <div class="result-section-comment-heading">
              <h2>Great</h2>
            </div>
            <div class="result-section-paragraph">
              <p>
                You scored higher than 65% of the people who have taken these
                tests.
              </p>
            </div>
          </div>
        </div>
      </div>
      <div class="summary-section-container">
        <div class="summary-section">
          <div class="summary-section-heading-container">
            <div class="summary-section-heading">
              <h3>Summary</h3>
            </div>
          </div>
          <div class="summary-section-categories-container">
            <div class="summary-section-category-container reaction">
              <div class="summary-section-category">
                <div class="summary-section-label-container">
                  <div class="summary-section-label-icon">
                    <img
                      src="assets/images/icon-reaction.svg"
                      alt="Lightning bolt icon"
                    />
                  </div>
                  <div class="summary-section-label-text">
                    <p class="reaction-text">Reaction</p>
                  </div>
                </div>
                <div class="summary-section-score">
                  <p>80/100</p>
                </div>
              </div>
            </div>
            <div class="summary-section-category-container memory">
              <div class="summary-section-category">
                <div class="summary-section-label-container">
                  <div class="summary-section-label-icon">
                    <img
                      src="assets/images/icon-memory.svg"
                      alt="Lightning bolt icon"
                    />
                  </div>
                  <div class="summary-section-label-text">
                    <p class="memory-text">Memory</p>
                  </div>
                </div>
                <div class="summary-section-score">
                  <p>92/100</p>
                </div>
              </div>
            </div>
            <div class="summary-section-category-container verbal">
              <div class="summary-section-category">
                <div class="summary-section-label-container">
                  <div class="summary-section-label-icon">
                    <img
                      src="assets/images/icon-verbal.svg"
                      alt="Lightning bolt icon"
                    />
                  </div>
                  <div class="summary-section-label-text">
                    <p class="verbal-text">Verbal</p>
                  </div>
                </div>
                <div class="summary-section-score">
                  <p>61/100</p>
                </div>
              </div>
            </div>
            <div class="summary-section-category-container visual">
              <div class="summary-section-category">
                <div class="summary-section-label-container">
                  <div class="summary-section-label-icon">
                    <img
                      src="assets/images/icon-visual.svg"
                      alt="Lightning bolt icon"
                    />
                  </div>
                  <div class="summary-section-label-text">
                    <p class="visual-text">Visual</p>
                  </div>
                </div>
                <div class="summary-section-score">
                  <p>73/100</p>
                </div>
              </div>
            </div>
          </div>
          <div class="summary-section-button-container">
            <button type="button">Continue</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
